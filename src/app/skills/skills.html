<section>
  <h2>Habilidades</h2>
  <div *ngFor="let skill of skillsList" class="skill-item">
    <p style="margin-bottom: 4px; font-weight: 500;">{{ skill.name }}</p>
    <div class="progress-bar">
      <div [style.width]="skill.percentaje + '%'">{{ skill.percentaje }}%</div>
    </div>
  </div>
</section>
